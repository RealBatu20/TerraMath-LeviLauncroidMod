name: build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  # Always-on gate: the portable formula engine must compile and pass tests.
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build-host -DCMAKE_BUILD_TYPE=Release
      - name: Build tests
        run: cmake --build build-host --target terramath_tests -j
      - name: Run tests
        run: ctest --test-dir build-host --output-on-failure

  # Android .so build. Runs only when the Levi Launchroid SDK location is
  # configured as a repo variable `PRELOADER_GIT` (a git URL whose checkout
  # exposes include/pl/Gloss.h). Without it the job is skipped, not failed,
  # because the SDK cannot be fetched from a guessed location.
  android:
    runs-on: ubuntu-latest
    needs: tests
    if: ${{ vars.PRELOADER_GIT != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d

      - name: Fetch Levi Launchroid / Gloss preloader SDK
        run: git clone --depth 1 "${{ vars.PRELOADER_GIT }}" preloader

      - name: Configure (arm64-v8a)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          cmake -S . -B build-android -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DPRELOADER_INCLUDE="${{ github.workspace }}/preloader/include"

      - name: Build
        run: cmake --build build-android -j

      - name: Locate artifact
        id: art
        run: echo "path=$(find build-android -name 'libterramath.so' | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libterramath-arm64-v8a
          path: ${{ steps.art.outputs.path }}
          if-no-files-found: error

      - name: Publish release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.art.outputs.path }}
