name: build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  # Levi Launchroid / Gloss preloader SDK: provides pl/Gloss.h + prebuilt
  # libGlossHook.a. Override via the PRELOADER_GIT repo variable if you fork it.
  PRELOADER_GIT: ${{ vars.PRELOADER_GIT != '' && vars.PRELOADER_GIT || 'https://github.com/LiteLDev/preloader-android' }}

jobs:
  # Always-on gate: the portable formula engine must compile and pass tests.
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build-host -DCMAKE_BUILD_TYPE=Release
      - name: Build tests
        run: cmake --build build-host --target terramath_tests -j
      - name: Run tests
        run: ctest --test-dir build-host --output-on-failure

  # Build libterramath.so (arm64-v8a) against the real preloader SDK.
  android:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d

      - name: Fetch preloader-android (pl/Gloss.h + libGlossHook.a)
        run: git clone --depth 1 "$PRELOADER_GIT" preloader

      - name: Configure (arm64-v8a)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          cmake -S . -B build-android -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DPRELOADER_INCLUDE="${{ github.workspace }}/preloader/src" \
            -DPRELOADER_LIB="${{ github.workspace }}/preloader/lib/ARM64/libGlossHook.a"

      - name: Build
        run: cmake --build build-android -j

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp "$(find build-android -name 'libterramath.so' | head -n1)" dist/libterramath.so
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libterramath-arm64-v8a
          path: dist/libterramath.so
          if-no-files-found: error

  # Publish a GitHub Release on every v* tag, with the built .so attached.
  release:
    runs-on: ubuntu-latest
    needs: [tests, android]
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: libterramath-arm64-v8a
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: TerraMath ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/libterramath.so
