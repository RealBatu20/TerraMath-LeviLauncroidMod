name: build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  # Always-on gate: the portable formula engine must compile and pass tests.
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build-host -DCMAKE_BUILD_TYPE=Release
      - name: Build tests
        run: cmake --build build-host --target terramath_tests -j
      - name: Run tests
        run: ctest --test-dir build-host --output-on-failure

  # Android .so build. Runs only when the Levi Launchroid SDK location is
  # configured as a repo variable `PRELOADER_GIT` (a git URL whose checkout
  # exposes include/pl/Gloss.h). Without it the job is skipped, not failed,
  # because the SDK cannot be fetched from a guessed location.
  android:
    runs-on: ubuntu-latest
    needs: tests
    if: ${{ vars.PRELOADER_GIT != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d

      - name: Fetch Levi Launchroid / Gloss preloader SDK
        run: git clone --depth 1 "${{ vars.PRELOADER_GIT }}" preloader

      - name: Configure (arm64-v8a)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          cmake -S . -B build-android -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DPRELOADER_INCLUDE="${{ github.workspace }}/preloader/include"

      - name: Build
        run: cmake --build build-android -j

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp "$(find build-android -name 'libterramath.so' | head -n1)" dist/libterramath.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libterramath-arm64-v8a
          path: dist/libterramath.so
          if-no-files-found: error

  # Publish a GitHub Release on every v* tag. Runs once tests pass, regardless
  # of whether the Android job ran — the .so is attached only if it was built
  # (i.e. when the SDK is configured), so tagging always produces a Release.
  release:
    runs-on: ubuntu-latest
    needs: [tests, android]
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') && needs.tests.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Android artifact (if built)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: libterramath-arm64-v8a
          path: dist

      - name: Note when the .so is absent
        run: |
          if [ ! -f dist/libterramath.so ]; then
            echo "No libterramath.so attached: set the repo variable PRELOADER_GIT" \
                 "to the Levi Launchroid SDK git URL so the android job can build it." \
                 | tee dist-note.txt
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: TerraMath ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/libterramath.so
